root: "./out"

dataset:
  name: "with_validate"
  years: [2024]

raw:
  sources:
    - type: "local_file"
      args:
        path: "data/raw/{year}/data.csv"
        filename: "data_{year}.csv"

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    header: true
    delim: ","
    encoding: "utf-8"

  required_columns:
    - id
    - nome
    - valore
    - categoria

  validate:
    min_rows: 5
    not_null:
      - id
      - nome

mart:
  tables:
    - name: "mart_example"
      sql: "sql/mart/mart_example.sql"

  required_tables:
    - "mart_example"

  validate:
    table_rules:
      mart_example:
        min_rows: 1
        not_null:
          - valore

output:
  artifacts: "standard"

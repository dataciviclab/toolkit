root: "./_smoke_out"

dataset:
  name: "bdap_ckan_csv"
  source_id: "bdap_ckan_lea"
  years: [2022]

raw:
  sources:
    - type: "ckan"
      args:
        portal_url: "https://bdap-opendata.rgs.mef.gov.it/SpodCkanApi/api/3"
        dataset_id: "d598ebd9-949d-4214-bb33-cd9c1be08f15"
        resource_id: "33344"
        filename: "bdap_lea_2024.csv"

clean:
  sql: "sql/clean.sql"
  read_mode: "fallback"
  read:
    delim: ";"
    decimal: "."
    encoding: "utf-8"
    header: true
    columns: null

  required_columns:
    - anno
    - regione
    - importo_totale

  validate:
    min_rows: 5
    not_null:
      - anno
      - regione

mart:
  tables:
    - name: "mart_ok"
      sql: "sql/mart/mart_ok.sql"

  required_tables:
    - "mart_ok"

  validate:
    table_rules:
      mart_ok:
        min_rows: 1

output:
  artifacts: "standard"

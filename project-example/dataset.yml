root: "./_smoke_out"

dataset:
  name: "project_example"
  years: [2022]

raw:
  source:
    type: "local_file"
    args:
      path: "data/raw_sample.csv"
      filename: "ispra_dettaglio_comunale_{year}.csv"

clean:
  sql: "sql/clean.sql"
  read:
    header: true
    delim: ";"
    quote: "\""
    escape: "\""
    nullstr: ["", "-", "NA", "N/A"]
    encoding: "utf-8"

  required_columns:
    - comune
    - provincia
    - regione
    - anno

  validate:
    min_rows: 1
    not_null: ["comune", "anno"]

mart:
  tables:
    - name: "rd_by_regione"
      sql: "sql/mart/mart_regione_anno.sql"
    - name: "rd_by_provincia"
      sql: "sql/mart/mart_provincia_anno.sql"

  required_tables: ["rd_by_regione", "rd_by_provincia"]

  validate:
    table_rules:
      rd_by_regione:
        min_rows: 1
      rd_by_provincia:
        min_rows: 1

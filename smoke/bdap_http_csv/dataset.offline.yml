root: "./_smoke_out"

dataset:
  name: "bdap_http_csv_offline"
  source_id: "bdap_test_offline"
  years: [2022, 2023]

raw:
  sources:
    - name: "bdap_sample"
      type: "local_file"
      args:
        path: "fixtures/bdap_sample.csv"
        filename: "bdap_sample_{year}.csv"

clean:
  sql: "sql/clean.sql"
  read_mode: "fallback"
  read:
    source: config_only
    mode: largest
    delim: ";"
    decimal: "."
    encoding: "utf-8"
    header: true
    columns: null

  required_columns:
    - anno
    - saldo_netto
    - spese_finali
    - entrate_finali

  validate:
    min_rows: 2
    not_null:
      - anno

mart:
  tables:
    - name: "mart_ok"
      sql: "sql/mart/mart_ok.sql"

  required_tables:
    - "mart_ok"

  validate:
    table_rules:
      mart_ok:
        min_rows: 1

output:
  artifacts: "standard"

root: "./_smoke_out"

dataset:
  name: "finanze_http_zip_2023"
  source_id: "mef_irpef_comunale"
  years: [2023]

raw:
  extractor:
    type: "unzip_first_csv"
  sources:
    - type: "http_file"
      args:
        url: "https://www1.finanze.gov.it/finanze/analisi_stat/public/v_4_0_0/contenuti/Redditi_e_principali_variabili_IRPEF_su_base_comunale_CSV_2023.zip?d=1615465800"

clean:
  sql: "sql/clean.sql"
  read_mode: "fallback"
  read:
    source: config_only
    mode: latest
    delim: ";"
    header: true
    encoding: "utf-8"
    trim_whitespace: true

  required_columns:
    - anno_imposta
    - regione
    - numero_contribuenti

  validate:
    min_rows: 100
    not_null:
      - anno_imposta

mart:
  tables:
    - name: "irpef_by_regione"
      sql: "sql/mart/irpef_by_regione.sql"

  required_tables:
    - "irpef_by_regione"

  validate:
    table_rules:
      irpef_by_regione:
        min_rows: 1

output:
  artifacts: "standard"

dataset: "toolkit_ispra_catasto_rifiuti"
root: "/content/drive/MyDrive/TestLab"

years: [2022, 2023]

raw:
  sources:
    - plugin: "http_file"
      url: "https://www.catasto-rifiuti.isprambiente.it/get/getDettaglioComunale.csv.php?&aa={year}"
      filename: "ispra_dettaglio_comunale_{year}.csv"

clean:
  # SQL-first: il metodo è nel file SQL versionato nel progetto
  sql: "sql/clean.sql"

  # Opzioni di lettura RAW (DuckDB)
  read:
    # consigliato per CSV “italiani” (virgole decimali, encoding, ecc.)
    all_varchar: true
    header: true
    delim: ";"
    quote: "\""
    escape: "\""
    nullstr: ["", "-", "NA", "N/A"]
    encoding: "utf-8"
    skip: 1

  # Validazioni minime (opzionali ma consigliate)
  required_columns:
    - comune
    - provincia
    - regione
    - anno

  validate:
    min_rows: 1
    not_null: ["comune", "anno"]

mart:
  tables:
    - name: "rd_by_regione"
      sql: "sql/mart_rd_by_regione.sql"
    - name: "rd_by_provincia"
      sql: "sql/mart_rd_by_provincia.sql"

  required_tables: ["rd_by_regione", "rd_by_provincia"]

  validate:
    table_rules:
      rd_by_regione:
        min_rows: 1
      rd_by_provincia:
        min_rows: 1

root: "./_smoke_out"

dataset:
  name: "bdap_http_csv"
  source_id: "bdap_rendiconto_saldi"
  years: [2022]
  time_coverage:
    mode: full_series
    start_year: 2003
    end_year: 2024

raw:
  sources:
    - type: "http_file"
      args:
        url: "https://bdap-opendata.rgs.mef.gov.it/export/csv/Rendiconto-Pubblicato---Serie-storica---Saldi.csv"
        filename: "bdap_rendiconto_saldi_{year}.csv"

clean:
  sql: "sql/clean.sql"
  read_mode: "fallback"
  read:
    delim: ";"
    decimal: "."
    encoding: "utf-8"
    header: true
    columns: null

  required_columns:
    - anno
    - saldo_netto
    - spese_finali
    - entrate_finali

  validate:
    min_rows: 5
    not_null:
      - anno

mart:
  tables:
    - name: "mart_ok"
      sql: "sql/mart/mart_ok.sql"

  required_tables:
    - "mart_ok"

  validate:
    table_rules:
      mart_ok:
        min_rows: 1

output:
  artifacts: "standard"

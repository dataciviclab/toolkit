root: "./out"

dataset:
  name: "http_source"
  years: [2024]

raw:
  sources:
    - type: "http_file"
      args:
        url: "https://example.it/data/dati.csv"
        filename: "dati_{year}.csv"

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    header: true
    delim: ","
    encoding: "utf-8"

  validate:
    min_rows: 1

mart:
  tables:
    - name: "totali"
      sql: "sql/mart/totali.sql"

  required_tables:
    - "totali"

  validate:
    table_rules:
      totali:
        min_rows: 1

output:
  artifacts: "standard"
